tools:
  - name: export_active_subtool_obj
    description: >-
      Export the currently active subtool to an OBJ file on disk. Overwrites an
      existing file at output_path. Requires the parent directory to exist.
    source_file: scripts/export_active_subtool_obj.py
    execution: sync
    affinity: main
    group: core
    annotations:
      destructive_hint: true
      read_only_hint: false
      idempotent_hint: true
    inputSchema:
      type: object
      required: [output_path]
      properties:
        output_path:
          type: string
          description: Absolute or relative path for the exported OBJ file.
    next-tools:
      on-success:
        - tool: zbrush_scene__get_scene_info
          reason: Confirm active tool after export.
      on-failure:
        - tool: zbrush_subtool__get_subtool_status
          reason: Check subtool visibility before retrying export.
