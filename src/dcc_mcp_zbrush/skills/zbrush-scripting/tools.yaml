tools:
  - name: execute_python
    description: >-
      Execute a Python snippet inside ZBrush's embedded interpreter. Mutates
      globals and may change the scene. Prefer typed zbrush-scene / zbrush-subtool
      / zbrush-interchange tools when available. Returns stdout, stderr, and an
      optional `result` variable from the namespace.
    source_file: scripts/execute_python.py
    execution: sync
    affinity: main
    group: core
    annotations:
      destructive_hint: true
      read_only_hint: false
      idempotent_hint: false
    inputSchema:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Python source executed with `zbc` pre-bound to zbrush.commands.
        context:
          type: object
          description: Optional extra names injected into the execution namespace.
          additionalProperties: true
    next-tools:
      on-success:
        - tool: zbrush_scene__get_scene_info
          reason: Confirm scene state after arbitrary code.
      on-failure:
        - tool: zbrush_scripting__get_session_info
          reason: Verify ZBrush session before retrying.
  - name: get_session_info
    description: >-
      Read ZBrush version, active tool path, and subtool count without modifying
      the scene. Safe health check for MCP wiring.
    source_file: scripts/get_session_info.py
    execution: sync
    affinity: main
    group: diagnostics
    annotations:
      read_only_hint: true
      idempotent_hint: true
    inputSchema:
      type: object
      properties: {}
    next-tools:
      on-success:
        - tool: zbrush_scene__get_scene_info
          reason: Inspect active tool and subtool selection next.
