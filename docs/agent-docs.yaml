# Single source of truth for dcc-mcp-zbrush agent documentation.
# Edit this file, then run `python tools/sync_agent_docs.py` to regenerate:
#   AGENTS.md, .claude/CLAUDE.md, llms.txt

project:
  name: dcc-mcp-zbrush
  description: ZBrush MCP server — external sidecar with a main-thread Python bridge
  repo_url: https://github.com/dcc-mcp/dcc-mcp-zbrush

target_host:
  software: ZBrush
  version: "2026.1+"
  sdk: "zbrush.commands (embedded Python SDK)"

modes:
  embedded:
    description: Advanced pure-Python experiments inside ZBrush
    stack: "Python plugin inside ZBrush → zbrush.commands"
    when: "A compatible pure-Python server is provided; do not load dcc-mcp-core _core.pyd"
    default: "Not recommended for released dcc-mcp-core wheels"
  sidecar:
    description: External MCP process with in-ZBrush main-thread bridge
    stack: "External Python → TCP :9876 → <Asset Directory>/Python/init.py → zbrush.commands"
    when: "Production GUI and CI clients"
    default: "Recommended default (dcc-mcp-zbrush --mode sidecar)"

autodetect:
  method: "resolve_mode() detects ZBrush availability; falls back to sidecar"
  library_mode: "auto"

do_not_assume:
  - "ZBrush HTTP REST API — it does not exist in official docs"
  - "Rust: only via dcc-mcp-core wheel; no Rust plugin inside ZBrush"
  - "dcc-mcp-core _core.pyd is safe to import into the ZBrush embedded VM"

ports:
  mcp: 0
  gateway: 9765
  socket_bridge: 9876

env_vars:
  - name: DCC_MCP_ZBRUSH_PORT
    default: "OS-assigned"
    purpose: "Optional fixed MCP instance port"
  - name: DCC_MCP_ZBRUSH_MODE
    default: auto
    purpose: "sidecar by default; embedded is advanced and pure-Python only"
  - name: DCC_MCP_ZBRUSH_AUTOSTART
    default: "1"
    purpose: "Auto-start embedded server from plugin"
  - name: DCC_MCP_ZBRUSH_SOCKET_PORT
    default: "9876"
    purpose: "Socket bridge port (sidecar)"
  - name: DCC_MCP_GATEWAY_PORT
    default: "9765"
    purpose: "Gateway election port"
  - name: DCC_MCP_MINIMAL
    default: "1"
    purpose: "Progressive skill loading"

skills_workflow:
  steps:
    - 'search_skills(query="subtool") → find skill'
    - 'load_skill("zbrush-scene") → expand tools'
    - "call zbrush_scene__list_subtools"
    - "execute_python only when no typed skill fits"
  default_minimal:
    - zbrush-scripting
    - zbrush-scene

bundled_skills:
  - name: zbrush-scripting
    tools:
      - execute_python
      - get_session_info
  - name: zbrush-scene
    tools:
      - get_scene_info
      - list_subtools
  - name: zbrush-subtool
    tools: []
  - name: zbrush-interchange
    tools: []

key_files:
  - path: src/dcc_mcp_zbrush/server.py
    role: "ZBrushMcpServer composition root"
  - path: src/dcc_mcp_zbrush/_executor.py
    role: "In-process dispatcher for embedded VM"
  - path: src/dcc_mcp_zbrush/bridge.py
    role: "Sidecar socket bridge client"
  - path: bridge/plugin/mcp_socket_bridge.py
    role: "In-ZBrush main-thread TCP bridge installed as Python/init.py"
  - path: bridge/plugin/dcc_mcp_zbrush/__init__.py
    role: "Auto-start embedded server"

agent_entry_points:
  - file: llms.txt
    role: "Minimal agent entry (modes, install, health check, failure modes)"
  - file: .claude/CLAUDE.md
    role: "Claude-specific entry referencing AGENTS.md"

zbrush_vm_constraints:
  - "Persistent interpreter shared across scripts"
  - "subprocess / multiprocessing invoking sys.executable are unsupported"
  - "Python background threads do not run reliably after a startup script returns"
  - "All zbrush.commands calls must run on the host main thread"
  - "The socket bridge must pump zbc.update while polling with a short timeout"
  - "Scene APIs must use affinity: main"

external_docs:
  - label: ZBrush Python SDK
    url: https://developers.maxon.net/docs/zbrush/py/2026_1_0/index.html
  - label: Upstream core llms.txt
    url: https://github.com/dcc-mcp/dcc-mcp-core/blob/main/llms.txt

distribution:
  artifacts:
    - name: PyPI wheel
      package: dcc-mcp-zbrush
      scope: "Python package (src/dcc_mcp_zbrush/) — MCP server, skills, bridge client"
      install: pip install dcc-mcp-zbrush
    - name: Plugin ZIP
      source: GitHub Release
      scope: "ZBrush plugin files — auto-start package, socket bridge, install scripts"
      install: "Download from latest release and run install-windows.ps1 or install-macos.sh"
    - name: Repo source
      source: git clone
      scope: "Everything above + bridge/plugin/ raw sources + tests + tools"
      install: git clone https://github.com/dcc-mcp/dcc-mcp-zbrush.git
  plugin_zip_note: "The wheel does not bundle bridge/plugin/ — that directory is only in the plugin ZIP or the repo checkout."

mcp_endpoint: "http://127.0.0.1:9765/mcp"
mcp_config:
  direct:
    url: "http://127.0.0.1:9765/mcp"
    label: "Cursor / Claude Desktop"
  gateway:
    url: "http://127.0.0.1:9765/mcp"
    label: "With gateway (multi-DCC)"

install_steps:
  - title: "Recommended sidecar install (PyPI + plugin ZIP)"
    steps:
      - "pip install dcc-mcp-zbrush"
      - "Download plugin ZIP and run installer in sidecar mode"
      - "Verify <Asset Directory>/Python/init.py exists"
      - "Restart ZBrush"
      - "Run dcc-mcp-zbrush --mode sidecar"
  - title: "Sidecar from source checkout"
    steps:
      - "pip install -e \".[dev]\""
      - "Copy bridge/plugin/mcp_socket_bridge.py to <Asset Directory>/Python/init.py"
      - "Restart ZBrush"

health_checks:
  - 'dcc-mcp-cli list  # discovers the exact OS-assigned instance URL'
  - 'call_tool("get_session_info")  # reads version + active tool + subtool count'
  - "SocketBridge.connect()  # sends JSON-RPC ping → expects {\"ok\": true}"

failure_modes:
  - problem: Connection refused
    cause: ZBrush not running
    fix: Start ZBrush
  - problem: MCP endpoint unreachable
    cause: Wrong mode or stale direct URL
    fix: "Start dcc-mcp-zbrush --mode sidecar, then run dcc-mcp-cli list; socket bridge remains on 9876"
  - problem: ZBrushNotAvailableError
    cause: Socket bridge plugin not installed
    fix: Copy mcp_socket_bridge.py to <Asset Directory>/Python/init.py and restart ZBrush
  - problem: subprocess fails
    cause: "ZBrush Python VM does not support subprocess"
    fix: Use execute_python skill instead
  - problem: ZBrush version < 2026.1
    cause: No Python SDK available
    fix: Upgrade to ZBrush 2026.1+
