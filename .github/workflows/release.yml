name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to rebuild, e.g. v0.2.0"
        required: false
        type: string
        default: ""
      release_version:
        description: "Version without v prefix, e.g. 0.2.0"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.decide.outputs.release_created }}
      tag_name: ${{ steps.decide.outputs.tag_name }}
      version: ${{ steps.decide.outputs.version }}
    steps:
      - name: Validate manual release backfill inputs
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ -z "$RELEASE_VERSION" ]; then
            echo "::error::release_version is required when release_tag is set"
            exit 1
          fi
          if [ "$RELEASE_TAG" != "v$RELEASE_VERSION" ]; then
            echo "::error::release_tag must match release_version, expected v$RELEASE_VERSION"
            exit 1
          fi
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - uses: googleapis/release-please-action@v5
        if: github.event_name != 'workflow_dispatch' || inputs.release_tag == ''
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Decide release outputs
        id: decide
        env:
          BACKFILL_TAG: ${{ inputs.release_tag }}
          BACKFILL_VERSION: ${{ inputs.release_version }}
          RP_RELEASE_CREATED: ${{ steps.release.outputs.release_created }}
          RP_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          RP_VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [ -n "$BACKFILL_TAG" ]; then
            release_created=true
            tag_name="$BACKFILL_TAG"
            version="$BACKFILL_VERSION"
          else
            release_created="${RP_RELEASE_CREATED:-false}"
            tag_name="$RP_TAG_NAME"
            version="$RP_VERSION"
          fi
          echo "release_created=$release_created" >> "$GITHUB_OUTPUT"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-python:
    name: Build wheel and sdist
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate release version
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          expected = os.environ["RELEASE_VERSION"]
          actual = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if actual != expected:
              print(f"::error::pyproject.toml has {actual}, expected {expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload Python dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload Python assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz

  build-zbrush-plugin:
    name: Build ZBrush plugin ZIP
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Pack ZBrush plugin
        env:
          RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
        run: python tools/pack_plugin.py --version "$RELEASE_VERSION" --output dist/plugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: zbrush-plugin
          path: dist/plugin/*.zip

      - name: Upload plugin to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/plugin/*.zip

  publish:
    name: Publish to PyPI
    needs: [release-please, build-python, build-zbrush-plugin]
    if: |
      needs.release-please.outputs.release_created == 'true' &&
      needs.build-python.result == 'success' &&
      needs.build-zbrush-plugin.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-zbrush
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download Python dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI (Trusted Publisher)
        id: pypi
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          skip-existing: true

      - name: Fail job if PyPI upload failed
        if: steps.pypi.outcome == 'failure'
        run: |
          echo "::error::PyPI upload failed"
          exit 1
